<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Anki Card Generator</title>
    <meta name="theme-color" content="#22C55E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Anki Cards" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body style="background-color:#F8FAF6;margin:0;">
    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background:
          radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.35) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 100%, rgba(16,185,129,0.45) 0%, transparent 55%),
          linear-gradient(135deg, #16A34A 0%, #22C55E 45%, #4ADE80 100%);
        color: #fff;
        font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        transition: opacity 600ms ease, visibility 600ms ease;
        overflow: hidden;
      }
      #app-splash.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      #app-splash::before, #app-splash::after {
        content: ""; position: absolute; border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
        filter: blur(40px); pointer-events: none;
      }
      #app-splash::before { width: 360px; height: 360px; top: -80px; left: -80px; animation: splashFloat 7s ease-in-out infinite; }
      #app-splash::after { width: 460px; height: 460px; bottom: -120px; right: -120px; animation: splashFloat 9s ease-in-out infinite reverse; }
      @keyframes splashFloat {
        0%,100% { transform: translate(0,0) scale(1); }
        50% { transform: translate(20px,-30px) scale(1.08); }
      }
      .splash-stack { position: relative; width: 168px; height: 200px; margin-bottom: 36px; perspective: 900px; }
      .splash-card {
        position: absolute; inset: 0; border-radius: 18px;
        background: linear-gradient(145deg, #ffffff 0%, #ECFDF5 100%);
        box-shadow: 0 18px 40px rgba(0,0,0,0.18), 0 4px 10px rgba(0,0,0,0.08);
        display: flex; align-items: center; justify-content: center;
        opacity: 0; transform-origin: bottom center;
        animation: splashCardIn 1100ms cubic-bezier(.2,.8,.2,1) forwards;
      }
      .splash-card.c1 { background: linear-gradient(145deg,#DCFCE7,#BBF7D0); animation-delay: 0ms;   transform: rotate(-10deg) translateY(20px); }
      .splash-card.c2 { background: linear-gradient(145deg,#A7F3D0,#86EFAC); animation-delay: 140ms; transform: rotate(0deg)   translateY(10px); }
      .splash-card.c3 { background: linear-gradient(145deg,#ffffff,#F0FDF4); animation-delay: 280ms; transform: rotate(8deg)   translateY(0); }
      @keyframes splashCardIn {
        0%   { opacity: 0; transform: translateY(60px) rotate(var(--r, 0deg)) scale(.9); }
        60%  { opacity: 1; }
        100% { opacity: 1; transform: translateY(0) rotate(var(--r, 0deg)) scale(1); }
      }
      .splash-card.c1 { --r: -10deg; }
      .splash-card.c2 { --r: 0deg; }
      .splash-card.c3 { --r: 8deg; }
      .splash-glyph {
        width: 92px; height: 92px; display: block;
        filter: drop-shadow(0 6px 14px rgba(21,128,61,0.35));
        animation: splashPulse 2.4s ease-in-out infinite;
      }
      @keyframes splashPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
      .splash-title {
        font-size: 38px; font-weight: 700; letter-spacing: -1px;
        opacity: 0; transform: translateY(12px);
        animation: splashFadeUp 700ms 420ms cubic-bezier(.2,.8,.2,1) forwards;
        text-shadow: 0 2px 14px rgba(0,0,0,0.18);
      }
      .splash-sub {
        margin-top: 10px; font-size: 16px; font-weight: 500; opacity: 0;
        transform: translateY(10px);
        animation: splashFadeUp 700ms 700ms cubic-bezier(.2,.8,.2,1) forwards;
        color: rgba(255,255,255,0.92);
      }
      @keyframes splashFadeUp { to { opacity: 1; transform: translateY(0); } }
      .splash-dots { margin-top: 28px; display: flex; gap: 8px; opacity: 0; animation: splashFadeUp 600ms 1000ms forwards; }
      .splash-dots span {
        width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.85);
        animation: splashDot 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: .15s; }
      .splash-dots span:nth-child(3) { animation-delay: .30s; }
      @keyframes splashDot { 0%,80%,100% { transform: scale(.6); opacity: .5; } 40% { transform: scale(1); opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        #app-splash *, #app-splash::before, #app-splash::after { animation: none !important; transition: none !important; }
        .splash-card, .splash-title, .splash-sub, .splash-dots { opacity: 1 !important; transform: none !important; }
      }
    </style>
    <div id="app-splash" role="status" aria-label="Loading AnkiGen">
      <div class="splash-stack">
        <div class="splash-card c1"></div>
        <div class="splash-card c2"></div>
        <div class="splash-card c3"><img class="splash-glyph" src="/favicon.svg" alt="" /></div>
      </div>
      <div class="splash-title">Welcome to AnkiGen</div>
      <div class="splash-sub">Turning your notes into flashcards…</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root" style="background-color:#F8FAF6;min-height:100vh;"></div>
    <script>window.__splashStart = performance.now();</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
