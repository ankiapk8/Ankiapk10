kind = "web"
previewPath = "/study-scheduler/"
title = "Final Year Study Planner"
version = "1.0.0"
id = "artifacts/study-scheduler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/study-scheduler/" ]
localPort = 21362

[services.development]
run = "pnpm --filter @workspace/study-scheduler run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-scheduler", "run", "build" ]
publicDir = "artifacts/study-scheduler/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21362"
BASE_PATH = "/study-scheduler/"
